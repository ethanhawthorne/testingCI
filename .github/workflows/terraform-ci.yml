name: Terraform CI

on:
  pull_request:
    paths:
      - "my-infrastructure/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [ "main" ]
    paths:
      - "my-infrastructure/**"
      - ".github/workflows/terraform-ci.yml"
  workflow_dispatch:

concurrency:
  group: terraform-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_WORKING_DIR: my-infrastructure
  TF_VERSION: "1.8.5"
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS_init: "-input=false -no-color"
  TF_CLI_ARGS_validate: "-no-color"
  AZURE_CLIENT_ID: "9f0df855-a264-41df-9458-e7260b67251f"
  AZURE_TENANT_ID: "4d914164-b009-4eec-88f4-a623fbcb11ef"
  AZURE_SUBSCRIPTION_ID: "b69dedcd-cfb8-4ec6-ba75-987e53dd2fd2"
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  ARM_CLIENT_ID: "9f0df855-a264-41df-9458-e7260b67251f"
  ARM_TENANT_ID: "4d914164-b009-4eec-88f4-a623fbcb11ef"
  ARM_SUBSCRIPTION_ID: "b69dedcd-cfb8-4ec6-ba75-987e53dd2fd2"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend for CI validation)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Azure Login (OIDC)
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Plan
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' }}
        run: |
          terraform init -backend=false -reconfigure
          terraform plan -no-color -input=false -var-file=terraform.tfvars -out=tfplan

      - name: Render Terraform Plan Text
        if: ${{ github.event_name == 'pull_request' && env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' }}
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Comment Terraform Plan on PR
        if: ${{ github.event_name == 'pull_request' && env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planPath = 'my-infrastructure/tfplan.txt';
            let plan = fs.readFileSync(planPath, 'utf8');
            const marker = '<!-- terraform-plan-comment -->';

            if (plan.length > 60000) {
              plan = plan.slice(0, 60000) + '\n\n...output truncated...';
            }

            const body = `${marker}
            ## Terraform Plan

            \\`\\`\\`
            ${plan}
            \\`\\`\\`
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Save Terraform Plan
        if: ${{ env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: |
            my-infrastructure/tfplan
            my-infrastructure/tfplan.txt
          if-no-files-found: ignore
