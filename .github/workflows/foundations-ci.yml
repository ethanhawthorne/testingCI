name: Foundations CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: testingci/app

jobs:
  basics:
    name: Basics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hello from CI
        run: echo "Foundations CI triggered for ${{ github.event_name }} on ${{ github.ref_name }}"

  test:
    name: Test and Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Format Check
        run: terraform -chdir=my-infrastructure fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform -chdir=my-infrastructure init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=my-infrastructure validate

  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
