name: Foundations CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.8.5"
  TF_WORKING_DIR: my-infrastructure
  IMAGE_NAME_FRONT: front-app
  IMAGE_NAME_BACK: back-app
  IMAGE_TAG_SHA: ${{ github.sha }}
  AZURE_CLIENT_ID: "9f0df855-a264-41df-9458-e7260b67251f"
  AZURE_TENANT_ID: "4d914164-b009-4eec-88f4-a623fbcb11ef"
  AZURE_SUBSCRIPTION_ID: "b69dedcd-cfb8-4ec6-ba75-987e53dd2fd2"
  ACR_NAME: "EthanHContaineRreg"
  ACR_LOGIN_SERVER: "ethanhcontainerreg.azurecr.io"
  TF_STATE_RESOURCE_GROUP: ${{ secrets.TF_STATE_RESOURCE_GROUP }}
  TF_STATE_STORAGE_ACCOUNT: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
  TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}
  TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  ARM_CLIENT_ID: "9f0df855-a264-41df-9458-e7260b67251f"
  ARM_TENANT_ID: "4d914164-b009-4eec-88f4-a623fbcb11ef"
  ARM_SUBSCRIPTION_ID: "b69dedcd-cfb8-4ec6-ba75-987e53dd2fd2"
  ACA_RESOURCE_GROUP: "EthanH-Resource-Group"
  ACA_LOCATION: "uksouth"
  ACA_ENV_NAME: "testingci-env"
  ACA_FRONT_APP: "front-testingci-dev"
  ACA_BACK_APP: "back-testingci-dev"

jobs:
  basics:
    name: Basics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hello from CI
        run: echo "Foundations CI triggered for ${{ github.event_name }} on ${{ github.ref_name }}"

  test:
    name: Test and Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

  build:
    name: Build Containers
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build front image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME_FRONT }}:${{ env.IMAGE_TAG_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build back image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME_BACK }}:${{ env.IMAGE_TAG_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push_image:
    name: Push Image to ACR (main only)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required ACR/Azure secrets
        run: |
          missing=0
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID ACR_NAME ACR_LOGIN_SERVER; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name "${{ env.ACR_NAME }}"

      - name: Set image tags
        id: image
        run: |
          echo "front_sha=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_FRONT }}:${{ env.IMAGE_TAG_SHA }}" >> "$GITHUB_OUTPUT"
          echo "front_main=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_FRONT }}:main" >> "$GITHUB_OUTPUT"
          echo "back_sha=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_BACK }}:${{ env.IMAGE_TAG_SHA }}" >> "$GITHUB_OUTPUT"
          echo "back_main=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_BACK }}:main" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push front image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.front_sha }}
            ${{ steps.image.outputs.front_main }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push back image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.back_sha }}
            ${{ steps.image.outputs.back_main }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_apps:
    name: Deploy Container Apps (main only)
    runs-on: ubuntu-latest
    needs: push_image
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Ensure Container Apps environment exists
        run: |
          az containerapp env show -g "${{ env.ACA_RESOURCE_GROUP }}" -n "${{ env.ACA_ENV_NAME }}" >/dev/null 2>&1 || \
          az containerapp env create -g "${{ env.ACA_RESOURCE_GROUP }}" -n "${{ env.ACA_ENV_NAME }}" -l "${{ env.ACA_LOCATION }}"

      - name: Prepare ACR credentials for Container Apps
        run: |
          az acr update -n "${{ env.ACR_NAME }}" --admin-enabled true
          ACR_USER=$(az acr credential show -n "${{ env.ACR_NAME }}" --query username -o tsv)
          ACR_PASS=$(az acr credential show -n "${{ env.ACR_NAME }}" --query passwords[0].value -o tsv)
          echo "ACR_USER=$ACR_USER" >> "$GITHUB_ENV"
          echo "ACR_PASS=$ACR_PASS" >> "$GITHUB_ENV"

      - name: Deploy backend app (internal)
        run: |
          retry_cmd() {
            local cmd="$1"
            local attempts=0
            local max_attempts=15
            while true; do
              set +e
              output=$(eval "$cmd" 2>&1)
              code=$?
              set -e
              if [ $code -eq 0 ]; then
                echo "$output"
                break
              fi
              if echo "$output" | grep -q "ContainerAppOperationInProgress"; then
                attempts=$((attempts + 1))
                if [ $attempts -ge $max_attempts ]; then
                  echo "$output"
                  echo "Timed out waiting for container app operation to finish"
                  exit 1
                fi
                echo "Container app operation in progress; retrying in 20s ($attempts/$max_attempts)"
                sleep 20
              else
                echo "$output"
                exit $code
              fi
            done
          }

          BACK_IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_BACK }}:${{ env.IMAGE_TAG_SHA }}"
          if az containerapp show -g "${{ env.ACA_RESOURCE_GROUP }}" -n "${{ env.ACA_BACK_APP }}" >/dev/null 2>&1; then
            retry_cmd "az containerapp registry set -g '${{ env.ACA_RESOURCE_GROUP }}' -n '${{ env.ACA_BACK_APP }}' --server '${{ env.ACR_LOGIN_SERVER }}' --username '$ACR_USER' --password '$ACR_PASS'"
            retry_cmd "az containerapp update -g '${{ env.ACA_RESOURCE_GROUP }}' -n '${{ env.ACA_BACK_APP }}' --image '$BACK_IMAGE'"
          else
            retry_cmd "az containerapp create -g '${{ env.ACA_RESOURCE_GROUP }}' -n '${{ env.ACA_BACK_APP }}' --environment '${{ env.ACA_ENV_NAME }}' --image '$BACK_IMAGE' --target-port 3001 --ingress internal --registry-server '${{ env.ACR_LOGIN_SERVER }}' --registry-username '$ACR_USER' --registry-password '$ACR_PASS'"
          fi

      - name: Deploy frontend app (external)
        run: |
          retry_cmd() {
            local cmd="$1"
            local attempts=0
            local max_attempts=15
            while true; do
              set +e
              output=$(eval "$cmd" 2>&1)
              code=$?
              set -e
              if [ $code -eq 0 ]; then
                echo "$output"
                break
              fi
              if echo "$output" | grep -q "ContainerAppOperationInProgress"; then
                attempts=$((attempts + 1))
                if [ $attempts -ge $max_attempts ]; then
                  echo "$output"
                  echo "Timed out waiting for container app operation to finish"
                  exit 1
                fi
                echo "Container app operation in progress; retrying in 20s ($attempts/$max_attempts)"
                sleep 20
              else
                echo "$output"
                exit $code
              fi
            done
          }

          FRONT_IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME_FRONT }}:${{ env.IMAGE_TAG_SHA }}"
          if az containerapp show -g "${{ env.ACA_RESOURCE_GROUP }}" -n "${{ env.ACA_FRONT_APP }}" >/dev/null 2>&1; then
            retry_cmd "az containerapp registry set -g '${{ env.ACA_RESOURCE_GROUP }}' -n '${{ env.ACA_FRONT_APP }}' --server '${{ env.ACR_LOGIN_SERVER }}' --username '$ACR_USER' --password '$ACR_PASS'"
            retry_cmd "az containerapp update -g '${{ env.ACA_RESOURCE_GROUP }}' -n '${{ env.ACA_FRONT_APP }}' --image '$FRONT_IMAGE' --target-port 3000"
          else
            retry_cmd "az containerapp create -g '${{ env.ACA_RESOURCE_GROUP }}' -n '${{ env.ACA_FRONT_APP }}' --environment '${{ env.ACA_ENV_NAME }}' --image '$FRONT_IMAGE' --target-port 3000 --ingress external --registry-server '${{ env.ACR_LOGIN_SERVER }}' --registry-username '$ACR_USER' --registry-password '$ACR_PASS'"
          fi

      - name: Show frontend URL
        run: |
          FQDN=$(az containerapp show -g "${{ env.ACA_RESOURCE_GROUP }}" -n "${{ env.ACA_FRONT_APP }}" --query properties.configuration.ingress.fqdn -o tsv)
          echo "Frontend URL: https://$FQDN"

  terraform_plan:
    name: Terraform Plan (branches/PR)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main') }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (branch preview)
        run: terraform init -backend=false -reconfigure

      - name: Terraform Plan (dev preview)
        run: terraform plan -refresh=false -input=false -var-file=environments/dev.tfvars

  terraform_deploy:
    name: Terraform Apply (main only)
    runs-on: ubuntu-latest
    needs: [push_image, deploy_apps]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required Terraform backend secrets
        run: |
          missing=0
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID TF_STATE_RESOURCE_GROUP TF_STATE_STORAGE_ACCOUNT TF_STATE_CONTAINER TF_STATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (remote backend)
        run: |
          terraform init \
            -reconfigure \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="tenant_id=${{ env.ARM_TENANT_ID }}" \
            -backend-config="subscription_id=${{ env.ARM_SUBSCRIPTION_ID }}" \
            -backend-config="client_id=${{ env.ARM_CLIENT_ID }}" \
            -backend-config="resource_group_name=${{ env.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}"

      - name: Terraform Plan (dev)
        run: terraform plan -input=false -var-file=environments/dev.tfvars -out=tfplan

      - name: Terraform Apply (dev)
        run: terraform apply -input=false -auto-approve tfplan
