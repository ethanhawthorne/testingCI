name: Terraform CI

on:
  pull_request:
    paths:
      - "my-infrastructure/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [ "main" ]
    paths:
      - "my-infrastructure/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  id-token: write

env:
  TF_WORKING_DIR: my-infrastructure
  TF_IN_AUTOMATION: "true"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend for CI validation)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Azure Login (OIDC)
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Plan
        if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
        run: terraform plan -no-color -input=false -var-file=terraform.tfvars
